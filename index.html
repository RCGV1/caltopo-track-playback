<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CalTopo Playback Tool</title>
  <meta http-equiv="refresh" content="0; url=https://caltopo-track-playback.vercel.app/">
  <link rel="canonical" href="https://caltopo-track-playback.vercel.app/">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #17212b; background: #edf1f4; }
    main { width: min(560px, calc(100vw - 32px)); background: white; border: 1px solid #d7dde2; border-radius: 8px; padding: 22px; box-shadow: 0 8px 24px rgba(22,32,42,.16); }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0 0 14px; color: #5f6b76; line-height: 1.4; }
    a { color: #0b6f6a; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>CalTopo Playback Tool</h1>
    <p>This GitHub Pages address has moved to the generic playback tool.</p>
    <a id="link" href="https://caltopo-track-playback.vercel.app/">Open the playback tool</a>
  </main>
  <script>
    const target = new URL("https://caltopo-track-playback.vercel.app/");
    target.search = location.search;
    target.hash = location.hash;
    document.getElementById("link").href = target.href;
    location.replace(target.href);
  </script>
</body>
</html>
